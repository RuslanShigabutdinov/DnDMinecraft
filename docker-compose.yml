services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    image: dndminecraft:latest
    restart: unless-stopped
    volumes:
      - storage-data:/var/www/html/storage/app/public
      - public-data:/mnt/public
    env_file: .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - public-data:/var/www/html/public:ro
      - ./public/build:/var/www/html/public/build:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - app-network

  postgres:
    image: postgres:alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  node:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
    profiles:
      - tools

  queue:
    image: dndminecraft:latest
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600"]
    env_file: .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      - app
      - postgres
      - redis
    networks:
      - app-network

volumes:
  postgres-data:
  redis-data:
  storage-data:
  public-data:

networks:
  app-network:
    driver: bridge
